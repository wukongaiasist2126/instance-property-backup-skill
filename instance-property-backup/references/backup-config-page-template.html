<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{instance_name}} Property File Backup Settings</title>
  <style>
    body { margin:0; background:#f5f7fb; color:#1f2937; font-family:"Microsoft YaHei",Arial,sans-serif; }
    .wrap { max-width: 960px; margin: 36px auto; padding: 0 20px 40px; }
    .hero { background: linear-gradient(135deg,#ffffff,#eef4ff); border:1px solid #dbe7ff; border-radius:18px; padding:28px 30px; box-shadow:0 10px 30px rgba(31,41,55,.06); margin-bottom:18px; }
    .hero-top { display:flex; justify-content:space-between; gap:18px; align-items:flex-start; }
    .hero-text { flex:1; min-width:0; }
    h1 { margin:0 0 10px; font-size:30px; color:#111827; }
    .subtitle { margin:0; color:#7b8794; font-size:14px; line-height:1.8; }
    .lang-switch { display:flex; gap:10px; flex-shrink:0; padding-top:2px; }
    .lang-btn { border:none; border-radius:999px; padding:7px 18px; min-width:72px; cursor:pointer; background:#eef2ff; color:#1e3a8a; font-size:14px; line-height:1.2; }
    .lang-btn.active { background:#2563eb; color:#fff; }
    .section-card { background:#fff; border:1px solid #e5e7eb; border-radius:16px; padding:22px 24px; margin:16px 0; box-shadow:0 8px 24px rgba(15,23,42,.04); }
    .title { font-size:18px; font-weight:700; margin-bottom:14px; color:#111827; }
    .field { margin:0; }
    label { display:block; font-weight:700; margin-bottom:6px; }
    input, select { width:100%; box-sizing:border-box; border:1px solid #d1d5db; border-radius:12px; padding:12px 14px; font-size:15px; background:#fff; }
    .hint { color:#8a94a6; font-size:13px; margin-top:6px; }
    .two-col { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .btns { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; align-items:center; }
    button.action { border:none; border-radius:12px; padding:12px 18px; font-size:15px; cursor:pointer; }
    .primary { background:#2563eb; color:#fff; }
    .secondary { background:#eef2ff; color:#1e3a8a; }
    .status-line { margin-top:12px; font-size:13px; line-height:1.7; min-height:22px; color:#8a94a6; }
    .status-line.ok { color:#15803d; }
    .status-line.error { color:#dc2626; }
    code { background:#f3f4f6; padding:3px 8px; border-radius:8px; font-size:14px; }
    @media (max-width: 760px) {
      .hero-top, .two-col { display:block; }
      .lang-switch { margin-top:14px; }
      .two-col .field + .field { margin-top:16px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="hero-top">
        <div class="hero-text">
          <h1 id="pageTitle"></h1>
          <p class="subtitle" id="pageSubtitle"></p>
        </div>
        <div class="lang-switch">
          <button class="lang-btn active" id="langZh" type="button">中文</button>
          <button class="lang-btn" id="langEn" type="button">English</button>
        </div>
      </div>
    </div>

    <div class="section-card">
      <div class="title" id="dailyTitle"></div>
      <div class="field">
        <label for="daily_time" id="dailyLabel"></label>
        <input id="daily_time" type="time" value="{{daily_time}}" />
        <div class="hint" id="dailyHint"></div>
      </div>
    </div>

    <div class="section-card">
      <div class="title" id="weeklyTitle"></div>
      <div class="two-col">
        <div class="field">
          <label for="weekly_day" id="weeklyDayLabel"></label>
          <select id="weekly_day">
            <option value="0">周日 / Sunday</option>
            <option value="1">周一 / Monday</option>
            <option value="2">周二 / Tuesday</option>
            <option value="3">周三 / Wednesday</option>
            <option value="4">周四 / Thursday</option>
            <option value="5">周五 / Friday</option>
            <option value="6">周六 / Saturday</option>
          </select>
        </div>
        <div class="field">
          <label for="weekly_time" id="weeklyTimeLabel"></label>
          <input id="weekly_time" type="time" value="{{weekly_time}}" />
        </div>
      </div>
      <div class="hint" id="weeklyHint" style="margin-top:10px;"></div>
    </div>

    <div class="section-card">
      <div class="title" id="backupTitle"></div>
      <div class="field">
        <label for="backup_root" id="backupRootLabel"></label>
        <input id="backup_root" type="text" value="{{backup_root_display}}" />
        <div class="hint" id="backupRootHint"></div>
      </div>
    </div>

    <div class="btns">
      <button class="action primary" id="saveBtn" type="button"></button>
      <button class="action secondary" id="defaultBtn" type="button"></button>
    </div>
    <div class="status-line" id="statusLine"></div>

    <div class="section-card">
      <div class="title" id="advancedTitle"></div>
      <div class="hint" id="advancedHint"></div>
      <div style="margin-top:10px;"><code>{{advanced_path_hint}}</code></div>
    </div>
  </div>

  <script>
    const DEFAULTS = {
      daily_time: {{daily_time_json}},
      weekly_day: {{weekly_day_json}},
      weekly_time: {{weekly_time_json}},
      backup_root: {{backup_root_json}},
      backup_root_display: {{backup_root_display_json}},
      config_path: {{config_file_json}},
      apply_script: {{apply_script_json}}
    };

    const weekdayTextZh = {"0":"周日","1":"周一","2":"周二","3":"周三","4":"周四","5":"周五","6":"周六"};
    const weekdayTextEn = {"0":"Sunday","1":"Monday","2":"Tuesday","3":"Wednesday","4":"Thursday","5":"Friday","6":"Saturday"};

    const i18n = {
      zh: {
        pageTitle: '{{instance_name}} 属性文件备份设置',
        pageSubtitle: '你可以在这里直接修改 3 个项目：每日备份时间、每周备份时间、备份目录。系统会保留属性文件的历史快照并持续维护一份最新版本；如果你不修改任何设置，系统会直接按默认时间与默认路径执行备份。',
        dailyTitle: '每日备份时间',
        dailyLabel: '设置每日执行时间',
        dailyHint: '默认：每日凌晨 3 点',
        weeklyTitle: '每周备份时间',
        weeklyDayLabel: '星期',
        weeklyTimeLabel: '时间',
        weeklyHint: '默认：每周六上午 10 点',
        backupTitle: '备份目录',
        backupRootLabel: '设置备份总文件夹',
        backupRootHint: '默认：与当前设置文件同路径，并自动带出实例名称',
        saveBtn: '保存并应用',
        defaultBtn: '恢复默认',
        advancedTitle: '高级说明',
        advancedHint: '如果你是懂技术的用户，想修改更多内容，请到 OpenClaw 实例 workspace 下的 property-backup 目录查看内部说明与配置文件。',
        savedText: '已保存并应用：每日 ' + {{daily_time_json}} + '；每周 ' + weekdayTextZh[{{weekly_day_json}}] + ' ' + {{weekly_time_json}} + '。',
        resetText: '已恢复为默认值，但尚未保存。',
        invalidText: '请先填写完整的时间和目录。',
        runningText: '正在保存并应用配置，请稍等...',
        engineMissingText: '当前环境无法直接执行本地保存逻辑。请用 OpenClaw/Cursor/Electron 方式打开此文件。',
        applyFailText: '配置已写入，但应用失败，请稍后重试。'
      },
      en: {
        pageTitle: '{{instance_name}} Property File Backup Settings',
        pageSubtitle: 'You can edit only three items here: daily backup time, weekly backup time, and backup directory. The system keeps historical snapshots of the property files and always maintains one latest version; if you change nothing, backups still run with the default time and directory.',
        dailyTitle: 'Daily Backup Time',
        dailyLabel: 'Set the daily run time',
        dailyHint: 'Default: 03:00 every day',
        weeklyTitle: 'Weekly Backup Time',
        weeklyDayLabel: 'Day',
        weeklyTimeLabel: 'Time',
        weeklyHint: 'Default: 10:00 every Saturday',
        backupTitle: 'Backup Directory',
        backupRootLabel: 'Set the backup root folder',
        backupRootHint: 'Default: same folder as this settings file, with the instance name appended automatically',
        saveBtn: 'Save and Apply',
        defaultBtn: 'Restore Defaults',
        advancedTitle: 'Advanced Notes',
        advancedHint: 'If you are a technical user and want to modify more details, go to the property-backup directory under the OpenClaw instance workspace to inspect the internal instruction and config files.',
        savedText: 'Saved and applied successfully.',
        resetText: 'Defaults restored, but not saved yet.',
        invalidText: 'Please fill in the time fields and backup directory first.',
        runningText: 'Saving and applying settings...',
        engineMissingText: 'This environment cannot run the local save logic directly. Open this file inside OpenClaw/Cursor/Electron.',
        applyFailText: 'Settings were saved, but apply failed. Please try again.'
      }
    };

    let currentLang = 'zh';
    document.getElementById('weekly_day').value = DEFAULTS.weekly_day;

    function setStatus(message, kind) {
      const el = document.getElementById('statusLine');
      el.textContent = message || '';
      el.className = 'status-line' + (kind ? ' ' + kind : '');
    }

    function renderLang() {
      const t = i18n[currentLang];
      document.getElementById('pageTitle').textContent = t.pageTitle;
      document.getElementById('pageSubtitle').textContent = t.pageSubtitle;
      document.getElementById('dailyTitle').textContent = t.dailyTitle;
      document.getElementById('dailyLabel').textContent = t.dailyLabel;
      document.getElementById('dailyHint').textContent = t.dailyHint;
      document.getElementById('weeklyTitle').textContent = t.weeklyTitle;
      document.getElementById('weeklyDayLabel').textContent = t.weeklyDayLabel;
      document.getElementById('weeklyTimeLabel').textContent = t.weeklyTimeLabel;
      document.getElementById('weeklyHint').textContent = t.weeklyHint;
      document.getElementById('backupTitle').textContent = t.backupTitle;
      document.getElementById('backupRootLabel').textContent = t.backupRootLabel;
      document.getElementById('backupRootHint').textContent = t.backupRootHint;
      document.getElementById('saveBtn').textContent = t.saveBtn;
      document.getElementById('defaultBtn').textContent = t.defaultBtn;
      document.getElementById('advancedTitle').textContent = t.advancedTitle;
      document.getElementById('advancedHint').textContent = t.advancedHint;
      document.getElementById('langZh').classList.toggle('active', currentLang === 'zh');
      document.getElementById('langEn').classList.toggle('active', currentLang === 'en');
      if (!document.getElementById('statusLine').textContent) {
        setStatus('', '');
      }
    }

    function validatePayload(payload) {
      return Boolean(payload.daily_time && payload.weekly_time && payload.backup_root && String(payload.backup_root).trim());
    }

    function normalizeBackupRoot(text) {
      const raw = String(text || '').trim();
      if (!raw) return '';
      if (/^[A-Za-z]:\\/.test(raw)) {
        const drive = raw.slice(0, 1).toLowerCase();
        const rest = raw.slice(2).replace(/\\/g, '/').replace(/^\/+/, '');
        return `/mnt/${drive}/${rest}`;
      }
      return raw;
    }

    function displayBackupRoot(text) {
      const raw = String(text || '').trim();
      if (raw.startsWith('/mnt/') && raw.length > 6) {
        const drive = raw[5].toUpperCase();
        const rest = raw.slice(7).replace(/\//g, '\\');
        return `${drive}:\\${rest}`;
      }
      return raw;
    }

    function buildPayload() {
      const weeklyDay = document.getElementById('weekly_day').value;
      const backupRootDisplay = document.getElementById('backup_root').value.trim();
      return {
        daily_time: document.getElementById('daily_time').value,
        weekly_day: weeklyDay,
        weekly_day_text_zh: weekdayTextZh[weeklyDay],
        weekly_day_text_en: weekdayTextEn[weeklyDay],
        weekly_time: document.getElementById('weekly_time').value,
        backup_root: normalizeBackupRoot(backupRootDisplay),
        backup_root_display: backupRootDisplay,
        config_path: DEFAULTS.config_path,
        apply_script: DEFAULTS.apply_script
      };
    }

    function saveAndApply(payload) {
      const fs = require('fs');
      const childProcess = require('child_process');
      const config = JSON.parse(fs.readFileSync(DEFAULTS.config_path, 'utf8'));
      config.daily_time = payload.daily_time;
      config.weekly_day = payload.weekly_day;
      config.weekly_time = payload.weekly_time;
      config.backup_root = payload.backup_root;
      config.backup_root_display = displayBackupRoot(payload.backup_root);
      config.instance_backup_dir = payload.backup_root;
      config.instance_backup_dir_display = displayBackupRoot(payload.backup_root);
      fs.writeFileSync(DEFAULTS.config_path, JSON.stringify(config, null, 2), 'utf8');
      const proc = childProcess.spawnSync('python3', [DEFAULTS.apply_script, '--config', DEFAULTS.config_path], { encoding: 'utf8' });
      let parsed = null;
      if (proc.stdout && proc.stdout.trim()) {
        try { parsed = JSON.parse(proc.stdout); } catch (err) { parsed = { raw: proc.stdout.trim() }; }
      }
      return {
        saved: true,
        applied: proc.status === 0,
        exitCode: proc.status,
        stdout: proc.stdout || '',
        stderr: proc.stderr || '',
        parsed
      };
    }

    document.getElementById('defaultBtn').addEventListener('click', () => {
      document.getElementById('daily_time').value = DEFAULTS.daily_time;
      document.getElementById('weekly_day').value = DEFAULTS.weekly_day;
      document.getElementById('weekly_time').value = DEFAULTS.weekly_time;
      document.getElementById('backup_root').value = DEFAULTS.backup_root_display;
      setStatus(i18n[currentLang].resetText, '');
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      const t = i18n[currentLang];
      const payload = buildPayload();
      if (!validatePayload(payload)) {
        setStatus(t.invalidText, 'error');
        return;
      }
      setStatus(t.runningText, '');
      try {
        if (typeof require !== 'function') {
          setStatus(t.engineMissingText, 'error');
          return;
        }
        const result = saveAndApply(payload);
        if (!result.applied) {
          setStatus(t.applyFailText + (result.stderr ? ' ' + result.stderr.trim() : ''), 'error');
          return;
        }
        if (currentLang === 'zh') {
          setStatus(`已保存并应用：每日 ${payload.daily_time}；每周 ${payload.weekly_day_text_zh} ${payload.weekly_time}；目录 ${displayBackupRoot(payload.backup_root)}`, 'ok');
        } else {
          setStatus(`Saved and applied: daily ${payload.daily_time}; weekly ${payload.weekly_day_text_en} ${payload.weekly_time}; folder ${displayBackupRoot(payload.backup_root)}`, 'ok');
        }
      } catch (err) {
        setStatus(String(err), 'error');
      }
    });

    document.getElementById('langZh').addEventListener('click', () => { currentLang = 'zh'; renderLang(); });
    document.getElementById('langEn').addEventListener('click', () => { currentLang = 'en'; renderLang(); });
    renderLang();
  </script>
</body>
</html>
